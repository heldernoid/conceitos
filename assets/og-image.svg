<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="og-title og-desc">
  <title id="og-title">Conceitos — Imaginando um futuro digital para Moçambique</title>
  <desc id="og-desc">Cartão social: marca de sol nascente à esquerda, nome Conceitos e tagline à direita, sobre fundo creme.</desc>

  
  <rect width="1200" height="630" fill="#FAFAF7"></rect>

  
  <line x1="64" y1="64" x2="1136" y2="64" stroke="#D9D7CF" stroke-width="1"></line>
  <line x1="64" y1="566" x2="1136" y2="566" stroke="#D9D7CF" stroke-width="1"></line>

  
  <g font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="2" fill="#5E5E5E">
