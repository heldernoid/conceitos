  <g transform="translate(520 0)">
    
    <text x="0" y="200" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="2.4" fill="#5E5E5E">CONCEITOS</text>

    
    <text x="0" y="260" font-family="IBM Plex Sans, sans-serif" font-weight="700" font-size="76" fill="#1A1A1A" letter-spacing="-1">Conceitos</text>

    
