    <path d="M70 200 a100 100 0 0 1 200 0 z" fill="#E8B547" transform="translate(0 -10)"></path>
    
    <line x1="20" y1="190" x2="320" y2="190" stroke="#ffffff" stroke-width="3" stroke-linecap="round"></line>

    
