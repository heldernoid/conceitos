<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>EMR — Saúde Moçambique</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared/styles.css" />
<style>
  .emr-shell{display:flex;flex-direction:column;min-height:100vh}
  .emr-body{flex:1;padding:20px 24px;max-width:1440px;margin:0 auto;width:100%}
  .pflist .row-card{display:grid;grid-template-columns:32px 1.4fr 1fr .8fr 1.2fr .9fr 1fr 80px;gap:12px;padding:10px 12px;align-items:center;border-bottom:1px solid var(--line-2);font-size:13px;cursor:pointer}
  .pflist .row-card:hover{background:var(--bg-2)}
  .pflist .head{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:600;background:var(--bg-2);border-bottom:1px solid var(--line)}
  .panel{background:#fff;border:1px solid var(--line);border-radius:var(--r-2)}
  .panel .ph{padding:12px 16px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:10px;justify-content:space-between}
  .panel .pb{padding:16px}
  .twocol{display:grid;grid-template-columns:300px 1fr;gap:20px}
  .threecol{display:grid;grid-template-columns:1.4fr 1fr;gap:20px}
  .vlist{display:flex;flex-direction:column}
  .vlist .item{padding:10px 12px;border-bottom:1px solid var(--line-2);cursor:pointer}
  .vlist .item:hover{background:var(--bg-2)}
  .vlist .item.sel{background:var(--blue-100)}
  .pill{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 8px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:2px;font-size:11px;color:var(--ink-2)}
  .login-bg{min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr;background:var(--bg)}
  .login-left{background:#0F3D27;color:#dfeae3;padding:48px;display:flex;flex-direction:column;justify-content:space-between}
  .login-left h1{font-size:36px;line-height:1.1;letter-spacing:-.01em;margin:0;color:#fff;max-width:440px}
  .login-left .meta{font-size:12px;color:#9bbfa8}
  .login-right{padding:48px;display:flex;align-items:center;justify-content:center}
  .login-card{width:380px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:var(--r-2);overflow:hidden}
  .seg button{height:32px;padding:0 12px;border:0;background:#fff;color:var(--ink-2);cursor:pointer;font-size:12px;font-family:inherit;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button.on{background:var(--green-100);color:var(--green-900);font-weight:600}
  .kpi{padding:14px;background:#fff;border:1px solid var(--line);border-radius:var(--r-2)}
  .kpi .lbl{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .kpi .num{font-size:28px;font-weight:600;letter-spacing:-.01em;margin-top:4px}
  .kpi .delta{font-size:11px;color:var(--ink-3);margin-top:4px}
  .vital{padding:10px 12px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-2)}
  .vital .vl{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .vital .vv{font-size:18px;font-weight:600}
  .vital .vu{font-size:11px;color:var(--ink-3)}
  .icd-result{padding:8px 10px;border:1px solid var(--line-2);border-radius:2px;background:#fff;display:flex;justify-content:space-between;cursor:pointer}
  .icd-result:hover{background:var(--bg-2)}
  .icd-result .code{font-family:var(--f-mono);color:var(--blue-700);font-size:12px}
  .timeline{position:relative;padding-left:18px}
  .timeline::before{content:"";position:absolute;left:5px;top:6px;bottom:6px;width:1px;background:var(--line)}
  .timeline .tl{position:relative;padding:0 0 14px 0}
  .timeline .tl::before{content:"";position:absolute;left:-18px;top:5px;width:11px;height:11px;border-radius:50%;background:#fff;border:2px solid var(--green-700)}
  .merge-grid{display:grid;grid-template-columns:1fr 60px 1fr;gap:12px;align-items:flex-start}
  .merge-card{border:1px solid var(--line);border-radius:var(--r-2);background:#fff;padding:14px}
  .merge-card.win{border-color:var(--green-700);background:var(--green-100)}
  .merge-arrow{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink-3);padding-top:60px;font-size:20px}
  .alert-strip{display:flex;gap:8px;align-items:center;padding:8px 12px;background:#FEF6E0;border:1px solid #E7D49C;border-radius:var(--r-2);font-size:12px;color:#5C4500}
  .crumb{font-size:12px;color:var(--ink-3)}
  .crumb a{color:var(--ink-3)}
  .crumb a:hover{color:var(--ink)}
  .keys{font-family:var(--f-mono);font-size:11px;color:var(--ink-3);background:var(--bg-2);padding:1px 6px;border-radius:2px;border:1px solid var(--line-2)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;

/* Demo data */
const FACILITY = { name: "Centro de Saúde de Maxixe", province: "Inhambane", level: "CS Tipo II" };
const ME = { name: "Cláudia Tembe", role: "Tec. Medicina", initials: "CT" };

const PATIENTS = [
  { id: "p1", initials:"BM", name:"Beatriz Machava", sex:"F", age:34, doc:"BI 110456789B", phone:"+258 84 123 4567", district:"Maxixe, Inhambane", reason:"Febre + calafrios há 3 dias", triage:"red", status:"Em consulta", allergies:"Penicilina", chronic:"HTA · DM tipo 2" },
  { id: "p2", initials:"JM", name:"João Matavele", sex:"M", age:62, doc:"BI 209887412C", phone:"+258 82 988 0011", district:"Inharrime", reason:"Tosse seca há 2 semanas", triage:"amber", status:"Sala 2", allergies:"Nenhuma conhecida", chronic:"HTA" },
  { id: "p3", initials:"EC", name:"Esperança Chissano", sex:"F", age:27, doc:"TMP-2026-0481", phone:"—", district:"Maxixe", reason:"Dor abdominal baixa", triage:"green", status:"Aguarda", allergies:"—", chronic:"—", temp:true },
  { id: "p4", initials:"HN", name:"Helena Nhachote", sex:"F", age:5, doc:"BI 182331904A", phone:"+258 86 412 3344", district:"Massinga", reason:"IRA · febre 39°", triage:"red", status:"Em consulta", allergies:"—", chronic:"—" },
  { id: "p5", initials:"RM", name:"Rogério Manjate", sex:"M", age:71, doc:"BI 301229811A", phone:"+258 84 277 1198", district:"Maxixe", reason:"Controlo HTA", triage:"green", status:"Aguarda", allergies:"AINEs", chronic:"HTA · IRC estádio 2" },
  { id: "p6", initials:"AN", name:"Aida Nhampossa", sex:"F", age:24, doc:"DIRE 4412211", phone:"+258 87 119 4422", district:"Maxixe", reason:"Pré-natal · 28 sem.", triage:"green", status:"Aguarda", allergies:"—", chronic:"Anemia ligeira" },
];

const ICD_SUGGEST = [
  { code:"B54", label:"Malária não especificada", note:"Suspeita malária simples" },
  { code:"B50.9", label:"Malária por P. falciparum sem complicações" },
  { code:"J06.9", label:"Infecção respiratória aguda das vias superiores" },
  { code:"A09", label:"Diarreia e gastroenterite presumivelmente infecciosas" },
  { code:"I10", label:"Hipertensão essencial (primária)" },
  { code:"O23", label:"Infecção do tracto urinário na gravidez" },
];

const MEDS = [
  { name:"Artemether-Lumefantrina 80/480 mg", form:"Comprimidos", stock:412 },
  { name:"Paracetamol 500 mg", form:"Comprimidos", stock:1200 },
  { name:"Amoxicilina 500 mg", form:"Cápsulas", stock:380 },
  { name:"Sulfato Ferroso 200 mg + Ác. Fólico", form:"Comprimidos", stock:84 },
  { name:"Sais de reidratação oral", form:"Saquetas", stock:240 },
  { name:"Hidroclorotiazida 25 mg", form:"Comprimidos", stock:520 },
];

/* Header */
function Header({ conn = "ok", screen, setScreen }){
  const tabs = [
    { id:"dashboard", lbl:"Painel" },
    { id:"patients", lbl:"Pacientes" },
    { id:"queue", lbl:"Sala de espera" },
    { id:"prescriptions", lbl:"Receitas" },
    { id:"lab", lbl:"Laboratório" },
  ];
  return (
    <>
      <div className="govstrip">
        <span>República de Moçambique</span><span className="sep">·</span>
        <span>MISAU · {FACILITY.name}</span><span className="sep">·</span>
        <span>Sessão clínica</span>
        <span style={{marginLeft:"auto"}}><a href="index.html" style={{color:"#cfe1d6"}}>← Pacote de mocks</a></span>
      </div>
      <header className="topbar">
        <a href="#" onClick={(e)=>{e.preventDefault();setScreen("dashboard")}} className="brand">
          <span className="mark"></span>
          <span className="stack"><span>Saúde Moçambique</span><small>EMR · {FACILITY.name}</small></span>
        </a>
        <nav className="nav">
          {tabs.map(t=>(<a key={t.id} className={screen===t.id?"active":""} href="#" onClick={(e)=>{e.preventDefault();setScreen(t.id)}}>{t.lbl}</a>))}
        </nav>
        <div className="right">
          <ConnPill state={conn} />
          <a href="DESIGN-emr.md" className="t-meta">DESIGN-emr.md ↗</a>
          <div className="idbadge">
            <div className="av sm green">{ME.initials}</div>
            <div className="who"><b>{ME.name}</b><span>{ME.role} · {FACILITY.level}</span></div>
          </div>
        </div>
      </header>
    </>
  );
}

function ConnPill({state}){
  if(state==="ok") return <span className="conn"><span className="d"></span> Sincronizado · há 12s</span>;
  if(state==="syncing") return <span className="conn amber"><span className="d"></span> A sincronizar · 8 alterações</span>;
  return <span className="conn off"><span className="d"></span> Offline · 14 em fila</span>;
}

/* Login */
function Login({ onSignIn }){
  const [step, setStep] = useState(1);
  const [facility, setFacility] = useState("Centro de Saúde de Maxixe");
  return (
    <div className="login-bg">
      <div className="login-left">
        <a href="index.html" className="brand" style={{color:"#fff"}}>
          <span className="mark" style={{background:"#fff"}}></span>
          <span className="stack" style={{color:"#fff"}}><span>Saúde Moçambique</span><small style={{color:"#9bbfa8"}}>EMR Clínico</small></span>
        </a>
        <div>
          <div className="t-overline" style={{color:"#9bbfa8"}}>Sistema clínico nacional</div>
          <h1 style={{marginTop:14}}>Registo único do paciente, em qualquer ponto da rede.</h1>
          <p style={{maxWidth:420,color:"#cfe0d6",marginTop:12,fontSize:15}}>Acesso restrito a profissionais de saúde acreditados pela MISAU. Toda a actividade é auditada e disponibilizada ao paciente.</p>
        </div>
        <div className="meta">v0.4.2 · Build 1184 · Suporte 24/7: +258 21 000 100</div>
      </div>
      <div className="login-right">
        <div className="login-card">
          {step===1 && (<>
            <div className="t-overline" style={{color:"var(--green-700)"}}>Passo 1 de 2</div>
            <h2 className="t-h2" style={{margin:"6px 0 18px"}}>Iniciar sessão</h2>
            <div className="col" style={{gap:14}}>
              <div className="field"><label>Nº profissional ou e-mail</label><input className="input lg" defaultValue="ctembe@misau.gov.mz" /></div>
              <div className="field"><label>Palavra-passe</label><input className="input lg" type="password" defaultValue="••••••••••" /></div>
              <button className="btn lg" onClick={()=>setStep(2)}>Continuar</button>
              <div className="t-meta" style={{textAlign:"center"}}>
                <a href="#">Esqueci a palavra-passe</a> · <a href="#">Pedir código por SMS</a>
              </div>
            </div>
          </>)}
          {step===2 && (<>
            <div className="crumb"><a href="#" onClick={(e)=>{e.preventDefault();setStep(1)}}>← voltar</a></div>
            <div className="t-overline" style={{color:"var(--green-700)",marginTop:8}}>Passo 2 de 2</div>
            <h2 className="t-h2" style={{margin:"6px 0 18px"}}>Selecionar unidade sanitária</h2>
            <p className="t-meta" style={{marginBottom:14}}>O seu turno define em que unidade está autenticada. Pode mudar depois.</p>
            <div className="col" style={{gap:8}}>
              {["Centro de Saúde de Maxixe","Hospital Distrital de Maxixe","Centro de Saúde Rural de Chicuque","Posto de Saúde de Pomene"].map(f=>(
                <label key={f} className="card" style={{padding:"12px 14px",cursor:"pointer",display:"flex",gap:10,alignItems:"center",borderColor: facility===f? "var(--green-700)":"var(--line)", background: facility===f? "var(--green-100)":"#fff"}}>
                  <input type="radio" checked={facility===f} onChange={()=>setFacility(f)} />
                  <div>
                    <div style={{fontWeight:600}}>{f}</div>
                    <div className="t-meta">Inhambane · CS Tipo II · 14 colegas em sessão</div>
                  </div>
                </label>
              ))}
            </div>
            <button className="btn lg block" style={{marginTop:14}} onClick={onSignIn}>Entrar como Cláudia Tembe</button>
            <div className="t-meta" style={{textAlign:"center",marginTop:10}}>Sessão expira após 30 min de inactividade.</div>
          </>)}
        </div>
      </div>
    </div>
  );
}

/* Dashboard */
function Dashboard({ go, openPatient, conn }){
  return (
    <>
      <div className="row spread" style={{marginBottom:14}}>
        <div>
          <div className="t-overline" style={{color:"var(--ink-3)"}}>Quarta, 15 de Abril de 2026</div>
          <h1 className="t-h1" style={{marginTop:4}}>Bom dia, Cláudia</h1>
          <p className="t-meta">Turno 07:00 – 19:00 · 6 pacientes em fila · 3 receitas para revisão</p>
        </div>
        <div className="row" style={{gap:8}}>
          <button className="btn secondary" onClick={()=>go("offline")}>Ver estado offline</button>
          <button className="btn" onClick={()=>go("search")}>Pesquisar paciente</button>
        </div>
      </div>
      <div className="grid g-4" style={{marginBottom:18}}>
        <div className="kpi"><div className="lbl">Pacientes hoje</div><div className="num">14</div><div className="delta">+3 vs. ontem · 6 em fila</div></div>
        <div className="kpi"><div className="lbl">Triagem vermelha</div><div className="num" style={{color:"var(--red-700)"}}>2</div><div className="delta">Helena N. (5a) · Beatriz M. (34a)</div></div>
        <div className="kpi"><div className="lbl">Resultados de lab</div><div className="num">5</div><div className="delta">3 não revistos</div></div>
        <div className="kpi"><div className="lbl">Sincronização</div><div className="num" style={{fontSize:18,marginTop:8}}><span className="badge green">8 enviadas</span></div><div className="delta">há 12s · servidor MISAU</div></div>
      </div>
      <div className="threecol">
        <div className="panel">
          <div className="ph">
            <div className="row" style={{gap:10}}>
              <h3 className="t-h3">Sala de espera</h3>
              <span className="badge">6 pacientes</span>
            </div>
            <div className="seg">
              <button className="on">Hoje</button><button>Vermelho/Amarelo</button><button>Pré-natal</button>
            </div>
          </div>
          <div className="pflist">
            <div className="row-card head"><span></span><span>Paciente</span><span>Documento</span><span>Idade</span><span>Sintoma principal</span><span>Triagem</span><span>Estado</span><span></span></div>
            {PATIENTS.map(p=>(
              <div key={p.id} className="row-card" onClick={()=>openPatient(p)}>
                <div className={`av sm ${p.triage==="red"?"":"green"}`} style={p.triage==="red"?{background:"var(--red-100)",color:"var(--red-700)"}:{}}>{p.initials}</div>
                <div><div style={{fontWeight:600}}>{p.name}</div><div className="t-meta">{p.district} · {p.sex}</div></div>
                <div className="mono" style={{fontSize:12}}>{p.doc}</div>
                <div>{p.age}</div>
                <div className="t-meta">{p.reason}</div>
                <div><TriageBadge t={p.triage} /></div>
                <div className="t-meta">{p.status}</div>
                <div><a href="#" onClick={(e)=>{e.preventDefault();openPatient(p)}}>Abrir</a></div>
              </div>
            ))}
          </div>
        </div>
        <div className="col">
          <div className="panel">
            <div className="ph"><h3 className="t-h3">Resultados de lab</h3><a className="t-meta" href="#">Ver tudo</a></div>
            <div className="vlist">
              <div className="item"><div className="row spread"><div><b>Beatriz Machava</b><div className="t-meta">Teste rápido malária — POSITIVO</div></div><span className="badge red">Não revisto</span></div></div>
              <div className="item"><div className="row spread"><div><b>João Matavele</b><div className="t-meta">Hemograma completo</div></div><span className="badge amber">Não revisto</span></div></div>
              <div className="item"><div className="row spread"><div><b>Aida Nhampossa</b><div className="t-meta">Análise de urina · normal</div></div><span className="badge green">Revisto</span></div></div>
            </div>
          </div>
          <div className="panel">
            <div className="ph"><h3 className="t-h3">Alertas clínicos</h3></div>
            <div className="pb col" style={{gap:10}}>
              <div className="alert-strip"><b>Stock baixo:</b>&nbsp;Sulfato Ferroso 200 mg — 84 unidades. Coordenação informada.</div>
              <div className="alert-strip" style={{background:"var(--blue-100)",borderColor:"#BFCBDD",color:"var(--blue-700)"}}><b>Vigilância:</b>&nbsp;3 casos suspeitos de malária esta semana no distrito de Maxixe.</div>
              <div className="alert-strip" style={{background:"var(--red-100)",borderColor:"#E5B7AE",color:"var(--red-700)"}}><b>Override pendente:</b>&nbsp;Justifique o acesso ao registo de Adérito Sigaúque (14/04, 22:48).</div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

function TriageBadge({t}){
  if(t==="red") return <span className="badge red">Vermelho</span>;
  if(t==="amber") return <span className="badge amber">Amarelo</span>;
  return <span className="badge">Verde</span>;
}

/* Patient search */
function Search({ go, openPatient, openMerge }){
  const [q, setQ] = useState("");
  const [tab, setTab] = useState("bi");
  const filtered = useMemo(()=>{
    if(!q.trim()) return [];
    return PATIENTS.filter(p =>
      p.name.toLowerCase().includes(q.toLowerCase()) ||
      p.doc.toLowerCase().includes(q.toLowerCase())
    );
  }, [q]);
  return (
    <>
      <div className="crumb"><a href="#" onClick={(e)=>{e.preventDefault();go("dashboard")}}>Painel</a> / Pesquisar paciente</div>
      <h1 className="t-h1" style={{margin:"8px 0 16px"}}>Pesquisar paciente</h1>
      <div className="panel" style={{marginBottom:14}}>
        <div className="ph">
          <div className="seg">
            <button className={tab==="bi"?"on":""} onClick={()=>setTab("bi")}>BI / DIRE</button>
            <button className={tab==="phone"?"on":""} onClick={()=>setTab("phone")}>Telefone</button>
            <button className={tab==="name"?"on":""} onClick={()=>setTab("name")}>Nome</button>
            <button className={tab==="tmp"?"on":""} onClick={()=>setTab("tmp")}>Código temporário</button>
          </div>
          <span className="t-meta">Pesquisa contra registo nacional · {PATIENTS.length} amostras</span>
        </div>
        <div className="pb">
          <div className="row" style={{gap:10}}>
            <input className="input lg" style={{flex:1}} placeholder={tab==="bi"?"Ex.: 110456789B":tab==="phone"?"+258 84 123 4567":tab==="tmp"?"TMP-2026-0481":"Ex.: Beatriz Machava"} value={q} onChange={(e)=>setQ(e.target.value)} />
            <button className="btn lg secondary" onClick={()=>setQ("Beatriz")}>Exemplo</button>
            <button className="btn lg secondary">Ler BI por câmara</button>
          </div>
          <div className="t-meta" style={{marginTop:10}}>Quando o paciente não tem documento físico, crie um <a href="#" onClick={(e)=>{e.preventDefault();go("temp")}}>registo temporário</a>. Ele pode ser ligado a um BI mais tarde.</div>
        </div>
      </div>

      {q && (
        <div className="panel">
          <div className="ph"><h3 className="t-h3">Resultados</h3><span className="t-meta">{filtered.length} correspondência(s)</span></div>
          {filtered.length===0 && (
            <div className="pb" style={{textAlign:"center",padding:32}}>
              <div className="t-overline" style={{color:"var(--red-700)"}}>Sem correspondência</div>
              <p className="t-meta" style={{maxWidth:380,margin:"6px auto 14px"}}>Não foi encontrado nenhum registo com este critério. Pode criar um registo temporário ou rever o documento apresentado.</p>
              <button className="btn" onClick={()=>go("temp")}>Criar registo temporário</button>
            </div>
          )}
          {filtered.map(p=>(
            <div key={p.id} className="vlist">
              <div className="item" onClick={()=>openPatient(p)}>
                <div className="row spread">
                  <div className="row" style={{gap:12}}>
                    <div className="av lg green">{p.initials}</div>
                    <div>
                      <div style={{fontWeight:600,fontSize:15}}>{p.name} <span className="t-meta">· {p.sex} · {p.age} a</span></div>
                      <div className="t-meta">{p.doc} · {p.phone} · {p.district}</div>
                      <div className="t-meta">Última consulta: 12/03/2026 · {FACILITY.name}</div>
                    </div>
                  </div>
                  <div className="row" style={{gap:8}}>
                    {p.temp && <span className="badge amber">Registo temporário</span>}

/* Main app */
function App(){
  const [auth, setAuth] = useState(false);
  const [screen, setScreen] = useState("dashboard");
  const [patient, setPatient] = useState(null);
  const [presOpen, setPresOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [conn, setConn] = useState("ok");

  // demo: drop conn when on offline screen
  useEffect(()=>{
    if(screen==="offline") setConn("offline");
    else setConn("ok");
  }, [screen]);

  const showToast = (m)=>{ setToast(m); setTimeout(()=>setToast(null), 3000); };

  if(!auth) return <Login onSignIn={()=>setAuth(true)} />;
  return (
    <div className="emr-shell">
      <Header conn={conn} screen={screen} setScreen={(s)=>setScreen(s)} />
      <main className="emr-body">
        {screen==="dashboard" && <Dashboard go={setScreen} openPatient={(p)=>{setPatient(p);setScreen("patient")}} conn={conn} />}
        {screen==="patients" && <Dashboard go={setScreen} openPatient={(p)=>{setPatient(p);setScreen("patient")}} conn={conn} />}
        {screen==="queue" && <Dashboard go={setScreen} openPatient={(p)=>{setPatient(p);setScreen("patient")}} conn={conn} />}
        {screen==="prescriptions" && <RxList go={setScreen} />}
        {screen==="lab" && <LabList go={setScreen} />}
        {screen==="search" && <Search go={setScreen} openPatient={(p)=>{setPatient(p);setScreen("patient")}} openMerge={()=>setScreen("merge")} />}
        {screen==="temp" && <TempRecord go={setScreen} />}
        {screen==="patient" && <Patient patient={patient} go={setScreen} />}
        {screen==="encounter" && <Encounter patient={patient} go={setScreen} openPrescribe={()=>setPresOpen(true)} />}
        {screen==="merge" && <Merge go={setScreen} />}
        {screen==="offline" && <Offline go={setScreen} />}
        {screen==="emergency" && <Emergency go={setScreen} />}
      </main>
      <Prescribe open={presOpen} onClose={()=>setPresOpen(false)} onIssued={()=>{setPresOpen(false);showToast("Receita Rx-2026-04-MZ-018 assinada e enviada à paciente.")}} />
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}
