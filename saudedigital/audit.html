<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>Auditoria & Supervisão — Saúde Moçambique</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared/styles.css" />
<style>
  .au-shell{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
  .au-body{flex:1;padding:20px 24px;max-width:1500px;margin:0 auto;width:100%}
  .au-grid{display:grid;grid-template-columns:240px 1fr;gap:24px}
  .au-side{position:sticky;top:80px;align-self:start}
  .side-h{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin:14px 8px 6px;font-weight:600}
  .side-link{display:block;padding:8px 10px;border-radius:6px;font-size:13px;color:var(--ink-2);text-decoration:none;cursor:pointer;border:1px solid transparent}
  .side-link:hover{background:#fff;border-color:var(--line-2)}
  .side-link.active{background:#fff;border-color:var(--line);color:var(--ink);font-weight:600}
  .side-link .ct{float:right;color:var(--ink-3);font-family:var(--f-mono);font-size:11px}

  .panel{background:#fff;border:1px solid var(--line);border-radius:var(--r-2)}
  .panel .ph{padding:12px 16px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:10px;justify-content:space-between}
  .panel .pb{padding:16px}

  .filterbar{display:flex;flex-wrap:wrap;gap:8px;padding:10px 12px;background:#fff;border:1px solid var(--line);border-radius:var(--r-2);margin-bottom:14px;align-items:center}
  .filterbar .seg{display:inline-flex;border:1px solid var(--line);border-radius:var(--r-2);overflow:hidden}
  .filterbar .seg button{height:30px;padding:0 12px;border:0;background:#fff;color:var(--ink-2);cursor:pointer;font-size:12px;font-family:inherit;border-right:1px solid var(--line)}
  .filterbar .seg button:last-child{border-right:0}
  .filterbar .seg button.on{background:var(--green-100);color:var(--green-900);font-weight:600}
  .filterbar .ftag{display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 10px;border:1px dashed var(--line);border-radius:14px;font-size:12px;color:var(--ink-2)}

  .num-big{font-size:34px;font-weight:600;letter-spacing:-.02em;line-height:1}
  .num-big.warn{color:var(--amber-700)}
  .num-big.bad{color:var(--red-700)}
  .num-big.good{color:var(--green-700)}
  .delta{font-size:11px;display:inline-flex;align-items:center;gap:3px}
  .delta.up{color:var(--red-700)}
  .delta.dn{color:var(--green-700)}

  .feed-row{display:grid;grid-template-columns:90px 1fr 1fr 110px 110px 80px;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line-2);align-items:center;font-size:13px}
  .feed-row.head{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:600;background:var(--bg-2)}
  .feed-row .ts{font-family:var(--f-mono);font-size:11px;color:var(--ink-3)}
  .feed-row.flag{background:#FCEFEC}
  .feed-row.warn{background:#FFFBEF}

  .case-card{padding:12px 14px;border-bottom:1px solid var(--line-2);display:grid;grid-template-columns:36px 1fr 140px 100px;gap:12px;align-items:flex-start;cursor:pointer}
  .case-card:hover{background:var(--bg-2)}
  .case-dot{width:10px;height:10px;border-radius:50%;margin-top:6px}

  .heat{display:grid;grid-template-columns:120px repeat(24,1fr);gap:2px}
  .heat .lab{font-size:10px;color:var(--ink-3);font-family:var(--f-mono)}
  .heat .cell{height:14px;border-radius:2px;background:var(--green-100)}

  .bar-row{display:flex;align-items:center;gap:10px;font-size:13px;padding:6px 0}
  .bar-row .lab{width:160px;color:var(--ink-2)}
  .bar-row .bar{flex:1;height:8px;background:var(--bg-2);border-radius:4px;overflow:hidden;position:relative}
  .bar-row .fill{height:100%;background:var(--green-700)}
  .bar-row .v{width:50px;text-align:right;font-family:var(--f-mono);font-size:12px;color:var(--ink-2)}

  .timeline{padding:10px 0}
  .timeline .ev{display:grid;grid-template-columns:130px 18px 1fr;gap:10px;padding:8px 12px;align-items:flex-start}
  .timeline .ev .dot{width:10px;height:10px;border-radius:50%;background:var(--green-700);margin-top:5px;border:3px solid #fff;box-shadow:0 0 0 1px var(--line)}
  .timeline .ev.warn .dot{background:var(--amber-700)}
  .timeline .ev.bad .dot{background:var(--red-700)}
  .timeline .ev .ts{font-family:var(--f-mono);font-size:11px;color:var(--ink-3)}

  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .pill{display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;border-radius:11px;font-size:11px;font-weight:500}
  .pill.live{background:var(--green-100);color:var(--green-700)}
  .pill.live .d{width:6px;height:6px;border-radius:50%;background:var(--green-700);animation:p 1.6s infinite}
  @keyframes p{50%{opacity:.3}}

  .pol-card{padding:14px;border:1px solid var(--line-2);border-radius:var(--r-2);background:#fff;display:flex;flex-direction:column;gap:6px}
  .pol-card .ttl{font-weight:600;font-size:14px}
  .pol-card .v{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em}

  .right-col{display:flex;flex-direction:column;gap:14px}

  .badge.role-doc{background:#EAF1FB;color:var(--blue-700);border-color:#BFCBDD}
  .badge.role-nurse{background:var(--green-100);color:var(--green-700);border-color:#BDDFCB}
  .badge.role-pharm{background:#F5EAFA;color:#5C2E86;border-color:#D8C3E5}
  .badge.role-admin{background:#FFF4DD;color:var(--amber-700);border-color:#E7D49C}
  .badge.role-pat{background:var(--bg-2);color:var(--ink-2);border-color:var(--line)}

  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:14px}
  .crumb{font-size:12px;color:var(--ink-3)}

  .table-tight{width:100%;border-collapse:collapse;font-size:13px}
  .table-tight th,.table-tight td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--line-2)}
  .table-tight th{background:var(--bg-2);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:600}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

const ME = { name:"Tomás Bivane", role:"Auditor MISAU · DPI", initials:"TB" };

function Header({tab, setTab}){
  const tabs=[["over","Visão geral"],["feed","Eventos"],["cases","Casos abertos"],["queries","Consultas e relatórios"],["policy","Políticas & papéis"]];
  return (<>
    <div className="govstrip">
      <span>República de Moçambique</span><span className="sep">·</span>
      <span>MISAU · Direcção de Protecção da Informação (DPI)</span><span className="sep">·</span>
      <span>Auditoria & Supervisão</span>
      <span style={{marginLeft:"auto"}}><a href="index.html" style={{color:"#cfe1d6"}}>← Pacote de mocks</a></span>
    </div>
    <header className="topbar">
      <a href="index.html" className="brand"><span className="mark"></span><span className="stack"><span>Saúde Moçambique</span><small>Auditoria · Painel central</small></span></a>
      <nav className="nav">
        {tabs.map(([id,lbl])=>(<a key={id} className={tab===id?"active":""} href="#" onClick={(e)=>{e.preventDefault();setTab(id)}}>{lbl}</a>))}
      </nav>
      <div className="right">
        <span className="pill live"><span className="d"></span>Stream ao vivo</span>
        <a href="DESIGN-audit.md" className="t-meta">DESIGN-audit.md ↗</a>
        <div className="idbadge">
          <div className="av sm green">{ME.initials}</div>
          <div className="who"><b>{ME.name}</b><span>{ME.role}</span></div>
        </div>
      </div>
    </header>
  </>);
}

function Side({tab, setTab}){
  const items={
    over:["Indicadores nacionais","Mapa de actividade","Top eventos críticos"],
    feed:["Tudo (live)","Override de emergência","Sinalizado por paciente","Acessos fora do horário","Acessos cross-facility","Erros de autenticação"],
    cases:["Em revisão (8)","A aguardar resposta (3)","Resolvidos esta semana","Arquivados"],
    queries:["Construtor","Saved · ANARME","Saved · Inhambane","Saved · Pediatria","Relatórios mensais","Exportações"],
    policy:["Papéis","Regras de override","Retenção de dados","Auditores","Logs do auditor"],
  };
  const counts={over:"",feed:"23k/dia",cases:"11",queries:"34",policy:""};
  return (
    <aside className="au-side">
      <div className="side-h">Surface · Auditoria</div>
      {Object.keys(items).map(k=>(
        <div key={k}>
          <div className={"side-link "+(tab===k?"active":"")} onClick={()=>setTab(k)}>
            {({over:"Visão geral",feed:"Stream de eventos",cases:"Casos",queries:"Consultas",policy:"Políticas"})[k]}
            {counts[k] && <span className="ct">{counts[k]}</span>}
          </div>
          {tab===k && <div style={{margin:"4px 0 10px 6px",borderLeft:"1px solid var(--line-2)",paddingLeft:8}}>
            {items[k].map((x,i)=>(<div key={i} className="side-link" style={{fontSize:12,padding:"5px 8px",color:"var(--ink-3)"}}>{x}</div>))}
          </div>}
        </div>
      ))}
      <div className="side-h" style={{marginTop:18}}>Suporte</div>
      <div className="side-link" style={{fontSize:12}}>Manual do auditor</div>
      <div className="side-link" style={{fontSize:12}}>Linha DPI · 1490</div>
    </aside>
  );
}

/* OVERVIEW */
function Overview(){
  return (
    <>
    <div className="toolbar">
      <div>
        <div className="t-overline" style={{color:"var(--ink-3)"}}>Visão geral · 15 Abril 2026 · 09:42</div>
        <h1 className="t-h1" style={{margin:"4px 0 0"}}>Painel nacional de auditoria</h1>
        <p className="t-meta">Activos: 1 482 unidades sanitárias · 14 217 profissionais · 1 904 farmácias</p>
      </div>
      <div className="row" style={{gap:8}}>
        <div className="seg" style={{display:"inline-flex",border:"1px solid var(--line)",borderRadius:"var(--r-2)",overflow:"hidden"}}>
          <button style={{height:32,padding:"0 12px",border:0,background:"#fff",fontSize:12}}>24h</button>
          <button style={{height:32,padding:"0 12px",border:0,background:"var(--green-100)",color:"var(--green-900)",fontSize:12,fontWeight:600,borderLeft:"1px solid var(--line)",borderRight:"1px solid var(--line)"}}>7 dias</button>
          <button style={{height:32,padding:"0 12px",border:0,background:"#fff",fontSize:12}}>30 dias</button>
          <button style={{height:32,padding:"0 12px",border:0,background:"#fff",fontSize:12,borderLeft:"1px solid var(--line)"}}>Ano</button>
        </div>
        <button className="btn secondary">Exportar PDF</button>
      </div>
    </div>

    <div className="kpi-grid" style={{marginBottom:14}}>
      <div className="panel" style={{padding:14}}><div className="t-overline">Eventos auditáveis</div><div className="num-big">1.42M</div><div className="delta dn">▼ 4% vs sem. anterior</div></div>
      <div className="panel" style={{padding:14}}><div className="t-overline">Override de emergência</div><div className="num-big warn">128</div><div className="delta up">▲ 11% — investigar</div></div>
      <div className="panel" style={{padding:14}}><div className="t-overline">Sinalizados por pacientes</div><div className="num-big bad">14</div><div className="delta up">▲ 2 esta semana</div></div>
      <div className="panel" style={{padding:14}}><div className="t-overline">Casos abertos</div><div className="num-big">11</div><div className="delta">SLA médio · 3.1 dias</div></div>
    </div>

    <div className="grid" style={{gridTemplateColumns:"1.4fr 1fr",gap:18}}>
      <div className="panel">
        <div className="ph"><h3 className="t-h3">Mapa de actividade · província</h3><span className="t-meta">Acessos por 1 000 habitantes</span></div>
        <div className="pb">
          {[
            ["Maputo Cidade",96,"green"],["Maputo Província",78,"green"],["Inhambane",54,"green"],
            ["Gaza",47,"green"],["Sofala",62,"green"],["Manica",41,"green"],["Tete",38,"amber"],
            ["Zambézia",29,"amber"],["Nampula",33,"amber"],["Cabo Delgado",17,"red"],["Niassa",21,"amber"],
          ].map(([p,v,c],i)=>(
            <div key={i} className="bar-row">
              <span className="lab">{p}</span>
              <span className="bar"><span className="fill" style={{width:(v)+"%",background: c==="red"?"var(--red-700)":c==="amber"?"var(--amber-700)":"var(--green-700)"}}></span></span>
              <span className="v">{v}</span>
            </div>
          ))}
          <div className="t-meta" style={{marginTop:10}}>Cabo Delgado e Niassa abaixo da meta — equipa de implantação MISAU em curso. Ver caso #IMP-014.</div>
        </div>
      </div>
      <div className="right-col">
        <div className="panel">
          <div className="ph"><h3 className="t-h3">Top eventos críticos · 24h</h3><a className="t-meta" href="#">Ver todos →</a></div>
          <div>
            <div className="case-card" style={{gridTemplateColumns:"12px 1fr 90px"}}>
              <span className="case-dot" style={{background:"var(--red-700)"}}></span>
              <div><b style={{fontSize:13}}>Override sem motivo registado</b><div className="t-meta">HC Beira · Dr. R. Massingue · 14:22</div></div>
              <span className="badge red">Crítico</span>
            </div>
            <div className="case-card" style={{gridTemplateColumns:"12px 1fr 90px"}}>
              <span className="case-dot" style={{background:"var(--amber-700)"}}></span>
              <div><b style={{fontSize:13}}>5 acessos cross-facility no mesmo BI</b><div className="t-meta">Diferentes províncias em 22 min · BI 309887412C</div></div>
              <span className="badge amber">Alto</span>
            </div>
            <div className="case-card" style={{gridTemplateColumns:"12px 1fr 90px"}}>
              <span className="case-dot" style={{background:"var(--amber-700)"}}></span>
              <div><b style={{fontSize:13}}>Receita possivelmente alterada</b><div className="t-meta">Rx-…091 · sinalizada por farmácia FM-088</div></div>
              <span className="badge amber">Alto</span>
            </div>
            <div className="case-card" style={{gridTemplateColumns:"12px 1fr 90px"}}>
              <span className="case-dot" style={{background:"var(--ink-3)"}}></span>
              <div><b style={{fontSize:13}}>Picos de erro de auth · Maxixe</b><div className="t-meta">23 falhas em 4 min · 03:11</div></div>
              <span className="badge">Médio</span>
            </div>
          </div>
        </div>
        <div className="panel">
          <div className="ph"><h3 className="t-h3">Conformidade · 7 dias</h3></div>
          <div className="pb">
            <div className="bar-row"><span className="lab">Override c/ motivo</span><span className="bar"><span className="fill" style={{width:"94%"}}></span></span><span className="v">94%</span></div>
            <div className="bar-row"><span className="lab">Notificação ao paciente</span><span className="bar"><span className="fill" style={{width:"99%"}}></span></span><span className="v">99%</span></div>
            <div className="bar-row"><span className="lab">2FA em sessões</span><span className="bar"><span className="fill" style={{width:"88%",background:"var(--amber-700)"}}></span></span><span className="v">88%</span></div>
            <div className="bar-row"><span className="lab">Logs íntegros (hash)</span><span className="bar"><span className="fill" style={{width:"100%"}}></span></span><span className="v">100%</span></div>
          </div>
        </div>
      </div>
    </div>

    <div className="panel" style={{marginTop:18}}>
      <div className="ph"><h3 className="t-h3">Mapa de calor · acessos por hora · últimos 7 dias</h3><span className="t-meta">Verde mais escuro = mais acessos · linhas tracejadas marcam fora-de-horário</span></div>
      <div className="pb">
        <div className="heat">
          <span className="lab"></span>
          {Array.from({length:24}).map((_,h)=>(<span key={h} className="lab" style={{textAlign:"center"}}>{h.toString().padStart(2,"0")}</span>))}
          {["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"].map((d,r)=>(
            <React.Fragment key={d}>
              <span className="lab">{d}</span>
              {Array.from({length:24}).map((_,h)=>{
                const business = h>=7&&h<=19;
                const intensity = business ? Math.min(1, .3 + Math.sin((h-7)/12*Math.PI)*.7 + (r<5?.1:-.1) + (Math.random()*.1)) : Math.random()*.18;
                const color = `oklch(${0.95-intensity*0.5} ${0.05+intensity*0.05} 150)`;
                return <span key={h} className="cell" style={{background:color, outline: !business && intensity>.12 ? "1px dashed var(--amber-700)" : "none"}}></span>;
              })}
            </React.Fragment>
          ))}
        </div>
        <div className="t-meta" style={{marginTop:10}}>5 células fora-de-horário tracejadas requerem revisão · maioria são overrides legítimos em hospitais provinciais (HP Beira, HC Quelimane).</div>
      </div>
    </div>
    </>
  );
}

/* EVENT FEED */
const EVENTS = [
  {ts:"09:41:08", actor:"Cláudia Tembe", role:"nurse", roleLbl:"Tec. Medicina", action:"Viu perfil + histórico", subject:"Beatriz Machava", at:"CS Maxixe", st:"ok"},
  {ts:"09:38:42", actor:"Sara Nhaca", role:"pharm", roleLbl:"Farmacêutica", action:"Dispensou Rx-…018 (parcial)", subject:"Beatriz Machava", at:"FM-088 Maxixe", st:"ok"},
  {ts:"09:34:11", actor:"Adérito Mucopo", role:"doc", roleLbl:"Médico", action:"Vídeo-consulta · 02:14", subject:"Beatriz Machava", at:"HP Inhambane", st:"ok"},
  {ts:"09:22:51", actor:"Aida Tovela", role:"nurse", roleLbl:"Enfermeira", action:"Triagem por chat", subject:"Beatriz Machava", at:"CS Maxixe", st:"ok"},
  {ts:"08:54:02", actor:"—", role:"pat", roleLbl:"Sistema", action:"Receita Rx-…091 sinalizada por farmácia", subject:"—", at:"FM-088 Maxixe", st:"flag"},
  {ts:"03:11:14", actor:"helena.n@misau.gov.mz", role:"admin", roleLbl:"Sessão", action:"23 erros de auth em 4 min", subject:"—", at:"CS Maxixe", st:"warn"},
  {ts:"22:48:33", actor:"Adérito Mucopo", role:"doc", roleLbl:"Médico", action:"Override de emergência", subject:"Beatriz Machava", at:"HP Inhambane", st:"flag"},
  {ts:"21:14:09", actor:"Délio Chongo", role:"pharm", roleLbl:"Farmacêutico", action:"Dispensou substância controlada (Tabela II)", subject:"João Matavele", at:"FM-091 Avenida", st:"ok"},
  {ts:"19:02:17", actor:"Cláudia Tembe", role:"nurse", roleLbl:"Tec. Medicina", action:"Editou diagnóstico (HTA → HTA + DM2)", subject:"Helena Nhachote", at:"CS Maxixe", st:"ok"},
  {ts:"18:48:01", actor:"R. Massingue", role:"doc", roleLbl:"Médico", action:"Override sem motivo registado", subject:"M. Cossa", at:"HC Beira", st:"flag"},
  {ts:"17:33:55", actor:"Aida Tovela", role:"nurse", roleLbl:"Enfermeira", action:"Encaminhamento amarelo", subject:"Beatriz Machava", at:"CS Maxixe", st:"ok"},
  {ts:"16:10:22", actor:"Sistema", role:"admin", roleLbl:"Sistema", action:"Backup integridade · OK", subject:"—", at:"DC Maputo", st:"ok"},
];
function Feed(){
  const [filter, setFilter] = useState("all");
  const rows = EVENTS.filter(e => filter==="all" || (filter==="flag"&&e.st==="flag") || (filter==="warn"&&e.st==="warn") || (filter==="ok"&&e.st==="ok"));
  return (<>
    <div className="toolbar">
      <div>
        <div className="crumb">Auditoria / Stream de eventos</div>
        <h1 className="t-h1" style={{margin:"4px 0 0"}}>Eventos · ao vivo</h1>
        <p className="t-meta">23 712 eventos hoje · 4 sinalizados · stream com atraso de ~2 s</p>
      </div>
      <div className="row" style={{gap:8}}>
        <button className="btn secondary">Pausar</button>
        <button className="btn secondary">Exportar (CSV)</button>
        <button className="btn">Criar consulta</button>
      </div>
    </div>

    <div className="filterbar">
      <div className="seg">
        <button className={filter==="all"?"on":""} onClick={()=>setFilter("all")}>Tudo · 23 712</button>
        <button className={filter==="flag"?"on":""} onClick={()=>setFilter("flag")}>Sinalizados · 4</button>
        <button className={filter==="warn"?"on":""} onClick={()=>setFilter("warn")}>Avisos · 11</button>
        <button className={filter==="ok"?"on":""} onClick={()=>setFilter("ok")}>OK</button>
      </div>
      <span className="ftag">Província: todas ✕</span>
      <span className="ftag">Papel: todos ✕</span>
      <span className="ftag">+ filtro</span>
      <div style={{flex:1}}></div>
      <span className="pill live"><span className="d"></span>Ao vivo</span>
    </div>

    <div className="panel">
      <div className="feed-row head">
        <span>Hora</span><span>Quem</span><span>Acção · Sujeito</span><span>Onde</span><span>Papel</span><span>Estado</span>
      </div>
      {rows.map((e,i)=>(
        <div key={i} className={"feed-row "+(e.st==="flag"?"flag":e.st==="warn"?"warn":"")}>
          <span className="ts">{e.ts}</span>
